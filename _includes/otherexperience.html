{% assign experience = site.data.data.otherexperience %}
{% if otherexperience %}
<section class="otherexperience">
    <h2 class="title">Other Experience</h2>
    {% for exp in experience %}
        <div class="other-experience-item">
            <div class="role">
                {{otherexp.role}}
            </div>
            <div class="company">
                {{exp.company}} 
                <span class="time">{{otherexp.time}}</span>
            </div> 
            <div class="details">{{otherexp.details}}</div>
        </div>
       
    {% endfor %}
</section>
{% endif %}
